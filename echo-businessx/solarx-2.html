const { useState, useRef, useEffect } = React;


const fmt = (n, dec = 0) => {
  if (n == null || isNaN(n)) return "--";
  return "$" + Number(n).toLocaleString("en-US", { minimumFractionDigits: dec, maximumFractionDigits: dec });
};
const pct = (n, dec = 1) => (n * 100).toFixed(dec) + "%";

// ── Signature Pad Component ──
function SignaturePad({ label, onSave, saved }) {
  const canvasRef = useRef(null);
  const [drawing, setDrawing] = useState(false);
  const [hasStrokes, setHasStrokes] = useState(false);

  useEffect(() => {
    const canvas = canvasRef.current;
    if (!canvas) return;
    const dpr = window.devicePixelRatio || 1;
    const rect = canvas.getBoundingClientRect();
    canvas.width = rect.width * dpr;
    canvas.height = rect.height * dpr;
    const ctx = canvas.getContext("2d");
    ctx.scale(dpr, dpr);
    ctx.strokeStyle = "#1a2e44";
    ctx.lineWidth = 2.5;
    ctx.lineCap = "round";
    ctx.lineJoin = "round";
  }, []);

  const getPos = (e) => {
    const rect = canvasRef.current.getBoundingClientRect();
    const t = e.touches ? e.touches[0] : e;
    return { x: t.clientX - rect.left, y: t.clientY - rect.top };
  };

  const start = (e) => {
    e.preventDefault();
    setDrawing(true);
    const ctx = canvasRef.current.getContext("2d");
    const { x, y } = getPos(e);
    ctx.beginPath();
    ctx.moveTo(x, y);
  };

  const move = (e) => {
    if (!drawing) return;
    e.preventDefault();
    const ctx = canvasRef.current.getContext("2d");
    const { x, y } = getPos(e);
    ctx.lineTo(x, y);
    ctx.stroke();
    setHasStrokes(true);
  };

  const end = (e) => {
    e.preventDefault();
    setDrawing(false);
  };

  const clear = () => {
    const canvas = canvasRef.current;
    const ctx = canvas.getContext("2d");
    const dpr = window.devicePixelRatio || 1;
    ctx.clearRect(0, 0, canvas.width / dpr, canvas.height / dpr);
    setHasStrokes(false);
  };

  const save = () => {
    if (!hasStrokes) return;
    const dataUrl = canvasRef.current.toDataURL("image/png");
    onSave(dataUrl);
  };

  if (saved) {
    return (
      <div style={{ marginBottom: 20 }}>
        <div style={{ fontSize: 11, color: "#6b7c8a", marginBottom: 6, textTransform: "uppercase", letterSpacing: 1 }}>{label}</div>
        <div style={{ background: "#f0faf4", border: "2px solid #34d399", borderRadius: 10, padding: 10, textAlign: "center" }}>
          <img src={saved} alt="Signature" style={{ maxWidth: "100%", height: 60 }} />
          <div style={{ fontSize: 12, color: "#059669", marginTop: 4, fontWeight: 600 }}>✓ Signed</div>
        </div>
      </div>
    );
  }

  return (
    <div style={{ marginBottom: 20 }}>
      <div style={{ fontSize: 11, color: "#6b7c8a", marginBottom: 6, textTransform: "uppercase", letterSpacing: 1 }}>{label}</div>
      <canvas
        ref={canvasRef}
        style={{ width: "100%", height: 100, border: "2px dashed #c5d0d8", borderRadius: 10, background: "#fafcfe", touchAction: "none" }}
        onMouseDown={start} onMouseMove={move} onMouseUp={end} onMouseLeave={end}
        onTouchStart={start} onTouchMove={move} onTouchEnd={end}
      />
      <div style={{ display: "flex", gap: 8, marginTop: 8 }}>
        <button onClick={clear} style={{ flex: 1, padding: "10px 0", border: "1px solid #d1d9e0", borderRadius: 8, background: "#fff", fontSize: 13, color: "#64748b", fontWeight: 600 }}>Clear</button>
        <button onClick={save} disabled={!hasStrokes} style={{ flex: 1, padding: "10px 0", border: "none", borderRadius: 8, background: hasStrokes ? "#f59e0b" : "#e2e8f0", fontSize: 13, color: hasStrokes ? "#fff" : "#94a3b8", fontWeight: 700 }}>Confirm Signature</button>
      </div>
    </div>
  );
}

// ── Lease Calculation Engine ──
function calcLease({ systemCost, monthlyBill, monthlySavingsY1, inflationRate, depositPct, costChangePct, interestRate, degradation, omEscalation, baseOM, elecRate, co2Factor, treesPerTonne, carEmissions, homesPerKwh }) {
  const deposit = systemCost * depositPct;
  const financed = systemCost - deposit;
  const annualSavingsY1 = monthlySavingsY1 * 12;
  const annualBill = monthlyBill * 12;
  const maxPaymentY1 = monthlyBill * costChangePct + monthlySavingsY1;
  const monthlyLease = maxPaymentY1;
  const annualLease = monthlyLease * 12;

  if (monthlyLease <= 0) return { tooLow: true };

  const monthlyRate = interestRate / 12;
  let balance = financed;
  let months = 0;
  while (balance > 0 && months < 600) {
    const prevBalance = balance;
    balance = balance * (1 + monthlyRate) - monthlyLease;
    months++;
    // Prorate final month: actual last payment is only what was needed
    if (balance <= 0) {
      var finalPayment = prevBalance * (1 + monthlyRate);
      break;
    }
  }

  // Total cost uses prorated final payment
  const fullMonthPayments = (months - 1) * monthlyLease;
  const totalLease = deposit + fullMonthPayments + (finalPayment || monthlyLease);
  const totalInterest = totalLease - systemCost;
  const leaseYears = months / 12;

  // Year 1 during lease
  const y1MonthlyCost = monthlyLease + (monthlyBill - monthlySavingsY1);
  const y1Difference = y1MonthlyCost - monthlyBill;

  // Post-lease (year after) — applies panel degradation for accuracy
  const yearsToEnd = Math.ceil(leaseYears);
  const inflMult = Math.pow(1 + inflationRate, yearsToEnd);
  const degMult = Math.pow(1 - degradation, yearsToEnd);
  const postBelco = (monthlyBill - monthlySavingsY1 * degMult) * inflMult;
  const postSaving = monthlySavingsY1 * degMult * inflMult;

  // 25 year projection
  const projection = [];
  let cumBenefit = -deposit;
  let cumCO2 = 0;
  const annualKwh = (annualSavingsY1 / elecRate);

  for (let y = 1; y <= 25; y++) {
    const belcoBill = annualBill * Math.pow(1 + inflationRate, y);
    const degraded = annualSavingsY1 * Math.pow(1 - degradation, y - 1) * Math.pow(1 + inflationRate, y);
    const lease = y <= leaseYears ? annualLease : (y <= Math.ceil(leaseYears) && months % 12 !== 0 ? annualLease * ((months % 12) / 12) : 0);
    const totalCost = belcoBill - degraded + lease;
    const saving = belcoBill - totalCost;
    cumBenefit += saving;
    const kwh = annualKwh * Math.pow(1 - degradation, y - 1);
    const co2 = kwh * co2Factor / 1000;
    cumCO2 += co2;
    const status = y <= Math.ceil(leaseYears) ? "Lease active" : "You own it!";
    projection.push({ year: y, belcoBill, solarSavings: degraded, lease, totalCost, saving, cumBenefit, status, kwh, co2, cumCO2 });
  }

  // Environmental metrics: annual average equivalents (dimensionally correct)
  const avgAnnualCO2 = cumCO2 / 25;

  return {
    deposit, financed, monthlyLease, months, leaseYears, totalLease, totalInterest,
    y1MonthlyCost, y1Difference, postBelco, postSaving,
    netBenefit25: cumBenefit,
    projection,
    totalCO2: cumCO2,
    trees: Math.round(avgAnnualCO2 * treesPerTonne),
    cars: avgAnnualCO2 / carEmissions,
  };
}

// ── Share Code Encoding ──
const encodeConfig = (cfg) => {
  try { return btoa(JSON.stringify(cfg)).replace(/\+/g, "-").replace(/\//g, "_").replace(/=+$/, ""); }
  catch(e) { return null; }
};
const decodeConfig = (code) => {
  try {
    let b = code.replace(/-/g, "+").replace(/_/g, "/");
    while (b.length % 4) b += "=";
    return JSON.parse(atob(b));
  } catch(e) { return null; }
};

// ── Carousel Component ──
function ImageCarousel({ images }) {
  const [idx, setIdx] = useState(0);
  if (!images || images.length === 0) return null;
  const img = images[idx];
  return (
    <div style={{ marginBottom: 14, borderRadius: 14, overflow: "hidden", boxShadow: "0 2px 8px rgba(0,0,0,0.1)", position: "relative" }}>
      <img src={img.src || img} alt="Site" style={{ width: "100%", display: "block" }} />
      {images.length > 1 && (
        <>
          <button onClick={() => setIdx((idx - 1 + images.length) % images.length)} style={{
            position: "absolute", left: 8, top: "50%", transform: "translateY(-50%)", width: 34, height: 34, borderRadius: 17,
            background: "rgba(0,0,0,0.5)", color: "#fff", border: "none", fontSize: 18, cursor: "pointer", display: "flex", alignItems: "center", justifyContent: "center",
          }}>‹</button>
          <button onClick={() => setIdx((idx + 1) % images.length)} style={{
            position: "absolute", right: 8, top: "50%", transform: "translateY(-50%)", width: 34, height: 34, borderRadius: 17,
            background: "rgba(0,0,0,0.5)", color: "#fff", border: "none", fontSize: 18, cursor: "pointer", display: "flex", alignItems: "center", justifyContent: "center",
          }}>›</button>
          <div style={{ position: "absolute", bottom: 38, left: 0, right: 0, display: "flex", justifyContent: "center", gap: 6 }}>
            {images.map((_, i) => (
              <div key={i} onClick={() => setIdx(i)} style={{ width: 8, height: 8, borderRadius: 4, background: i === idx ? "#fff" : "rgba(255,255,255,0.4)", cursor: "pointer", transition: "background 0.2s" }} />
            ))}
          </div>
        </>
      )}
      <div style={{
        position: "absolute", bottom: 0, left: 0, right: 0,
        background: "linear-gradient(transparent, rgba(26,46,68,0.85))",
        padding: "24px 14px 10px", color: "#fff",
      }}>
        <div style={{ fontSize: 13, fontWeight: 700 }}>{"caption" in img ? img.caption : "Your Solar Installation"}</div>
      </div>
    </div>
  );
}

// ── Main App ──
function SolarXApp() {
  const [mode, setMode] = useState("landing"); // "landing" | "staff" | "client"
  const [pinInput, setPinInput] = useState("");
  const [pinError, setPinError] = useState(false);
  const [staffClients, setStaffClients] = useState([]);
  const [generatedCode, setGeneratedCode] = useState("");
  // Staff form fields
  const [sfName, setSfName] = useState("");
  const [sfAddress, setSfAddress] = useState("");
  const [sfCost, setSfCost] = useState("");
  const [sfBill, setSfBill] = useState("");
  const [sfSavings, setSfSavings] = useState("");
  const [sfDesc, setSfDesc] = useState("");
  const [sfDeposit, setSfDeposit] = useState("15");
  const [sfImages, setSfImages] = useState([]); // array of {src, caption}
  const [siteImages, setSiteImages] = useState(DEMO_SITE_IMGS);
  const [codeInput, setCodeInput] = useState("");
  const [codeError, setCodeError] = useState("");

  const [tab, setTab] = useState("calc");
  const [clientName, setClientName] = useState("St George's Hotel");
  const [siteAddress, setSiteAddress] = useState("St George's, Bermuda");
  const [systemCost, setSystemCost] = useState(385889);
  const [monthlyBill, setMonthlyBill] = useState(29744);
  const [monthlySavingsY1, setMonthlySavingsY1] = useState(4430);
  const [inflationRate, setInflationRate] = useState(0.025);
  const [depositPct, setDepositPct] = useState(0.15);
  const [costChangePct, setCostChangePct] = useState(0.10);
  const [systemDescription, setSystemDescription] = useState("Solar array across hotel roof and basketball court canopy");
  const [sigLessor, setSigLessor] = useState(null);
  const [sigLessee, setSigLessee] = useState(null);
  const [sigLessorName, setSigLessorName] = useState("");
  const [sigLesseeName, setSigLesseeName] = useState("");
  const [sigLesseeTitle, setSigLesseeTitle] = useState("");
  const [agreedDate, setAgreedDate] = useState(new Date().toISOString().slice(0, 10));
  const [showProjection, setShowProjection] = useState(false);
  const [editingField, setEditingField] = useState(null);

  const result = calcLease({
    systemCost, monthlyBill, monthlySavingsY1, inflationRate, depositPct, costChangePct, ...DEFAULTS,
  });

  const allFieldsComplete = !!(
    clientName && siteAddress && sigLessor && sigLessee &&
    sigLessorName && sigLesseeName && sigLesseeTitle && agreedDate && result && !result.tooLow
  );

  const [printView, setPrintView] = useState(false);

  const mailtoUrl = (() => {
    if (!result || result.tooLow) return "";
    const s = encodeURIComponent("SolarX HoT Signed - " + clientName + " - " + siteAddress);
    const b = encodeURIComponent("Please find the signed Heads of Terms for:\n\nClient: " + clientName + "\nSite: " + siteAddress + "\nDate: " + new Date(agreedDate).toLocaleDateString("en-GB", { day: "numeric", month: "long", year: "numeric" }) + "\n\nThe signed PDF is attached.\n\n---\nSent from SolarX Lease Calculator");
    return "mailto:sean.reel@ignitebermuda.com?subject=" + s + "&body=" + b;
  })();

  const handleSubmit = () => {
    setPrintView(true);
    setTimeout(() => { try { window.print(); } catch(e) {} }, 600);
  };

  const handlePinSubmit = () => {
    if (pinInput === STAFF_PIN) { setMode("staff"); setPinError(false); }
    else { setPinError(true); }
  };

  const handleGenerateCode = () => {
    if (!sfName || !sfCost || !sfBill || !sfSavings) return;
    const cfg = {
      n: sfName, a: sfAddress, c: parseFloat(sfCost) || 0, b: parseFloat(sfBill) || 0,
      s: parseFloat(sfSavings) || 0, d: sfDesc, dp: parseFloat(sfDeposit) / 100 || 0.15,
    };
    if (sfImages.length) cfg.imgs = sfImages;
    const code = encodeConfig(cfg);
    setGeneratedCode(code);
    setStaffClients(prev => [...prev, { ...cfg, code, ts: new Date().toLocaleString() }]);
  };

  const handleLoadCode = () => {
    const cfg = decodeConfig(codeInput.trim());
    if (!cfg || !cfg.n || !cfg.c) { setCodeError("Invalid code. Please check and try again."); return; }
    setClientName(cfg.n || "");
    setSiteAddress(cfg.a || "");
    setSystemCost(cfg.c || 385889);
    setMonthlyBill(cfg.b || 29744);
    setMonthlySavingsY1(cfg.s || 4430);
    setSystemDescription(cfg.d || "");
    setDepositPct(cfg.dp || 0.15);
    if (cfg.imgs) setSiteImages(cfg.imgs);
    setCodeError("");
    setMode("client");
  };

  const handleStaffReset = () => {
    setSfName(""); setSfAddress(""); setSfCost(""); setSfBill(""); setSfSavings(""); setSfDesc(""); setSfDeposit("15");
    setSfImages([]); setGeneratedCode("");
  };

  const compressImage = (file) => {
    const reader = new FileReader();
    reader.onload = (ev) => {
      const img = new Image();
      img.onload = () => {
        const canvas = document.createElement("canvas");
        const maxW = 320;
        const scale = Math.min(maxW / img.width, 1);
        canvas.width = img.width * scale;
        canvas.height = img.height * scale;
        const ctx = canvas.getContext("2d");
        ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
        const compressed = canvas.toDataURL("image/jpeg", 0.3);
        // Strip the data:image/jpeg;base64, prefix to save space in code
        setSfImages(prev => [...prev, { src: compressed, caption: "Site photo " + (prev.length + 1) }]);
      };
      img.src = ev.target.result;
    };
    reader.readAsDataURL(file);
  };

  const tabs = [
    { id: "calc", label: "Calculator", icon: "⚡" },
    { id: "impact", label: "Impact", icon: "🌱" },
    { id: "terms", label: "Agreement", icon: "📝" },
  ];

  const containerStyle = {
    fontFamily: "'DM Sans', 'Avenir', -apple-system, sans-serif",
    maxWidth: 480,
    margin: "0 auto",
    background: "#f7f9fb",
    minHeight: "100vh",
    color: "#1a2e44",
    fontSize: 14,
    lineHeight: 1.5,
    position: "relative",
    paddingBottom: 80,
  };

  const cardStyle = {
    background: "#fff",

                {/* Lessee Signature */}
                <div style={{ background: "#f7f9fb", borderRadius: 12, padding: 14 }}>
                  <div style={{ fontSize: 12, fontWeight: 700, color: "#1a2e44", marginBottom: 10 }}>For and on behalf of {clientName || "[Client]"}</div>
                  <SignaturePad label="Signature" onSave={setSigLessee} saved={sigLessee} />
                  <div style={{ marginBottom: 10 }}>
                    <div style={{ fontSize: 11, color: "#6b7c8a", marginBottom: 4 }}>Name</div>
                    <input style={{ ...inputStyle, fontSize: 13 }} value={sigLesseeName} onChange={e => setSigLesseeName(e.target.value)} placeholder="Full name" />
                  </div>
                  <div style={{ marginBottom: 10 }}>
                    <div style={{ fontSize: 11, color: "#6b7c8a", marginBottom: 4 }}>Title</div>
                    <input style={{ ...inputStyle, fontSize: 13 }} value={sigLesseeTitle} onChange={e => setSigLesseeTitle(e.target.value)} placeholder="e.g. Director, Owner" />
                  </div>
                  <div>
                    <div style={{ fontSize: 11, color: "#6b7c8a", marginBottom: 4 }}>Date</div>
                    <input style={{ ...inputStyle, fontSize: 13 }} type="date" value={agreedDate} onChange={e => setAgreedDate(e.target.value)} />
                  </div>
                </div>

                {/* Completion Status & Submit */}
                {sigLessor && sigLessee && sigLessorName && sigLesseeName && (
                  <div style={{ marginTop: 16 }}>
                    <div style={{ background: "#f0fdf4", border: "2px solid #34d399", borderRadius: 12, padding: 16, textAlign: "center", marginBottom: 12 }}>
                      <div style={{ fontSize: 24, marginBottom: 4 }}>✓</div>
                      <div style={{ fontSize: 15, fontWeight: 700, color: "#059669" }}>Heads of Terms Complete</div>
                      <div style={{ fontSize: 12, color: "#6b7c8a", marginTop: 4 }}>Both parties have signed.</div>
                    </div>

                    {!allFieldsComplete && (
                      <div style={{ background: "#fffbeb", border: "1.5px solid #f59e0b", borderRadius: 10, padding: 12, marginBottom: 12 }}>
                        <div style={{ fontSize: 12, fontWeight: 600, color: "#d97706", marginBottom: 4 }}>Missing fields:</div>
                        <div style={{ fontSize: 11, color: "#92400e" }}>
                          {[
                            !clientName && "Client name",
                            !siteAddress && "Site address",
                            !sigLesseeTitle && "Lessee title",
                          ].filter(Boolean).join(", ")}
                        </div>
                      </div>
                    )}

                    <div>
                        <button
                          onClick={handleSubmit}
                          disabled={!allFieldsComplete}
                          style={{
                            width: "100%", padding: "18px 0", border: "none", borderRadius: 12,
                            background: allFieldsComplete ? "linear-gradient(135deg, #059669 0%, #34d399 100%)" : "#e2e8f0",
                            color: allFieldsComplete ? "#fff" : "#94a3b8",
                            fontSize: 16, fontWeight: 800, cursor: allFieldsComplete ? "pointer" : "default",
                            letterSpacing: 0.3, boxShadow: allFieldsComplete ? "0 4px 12px rgba(5,150,105,0.3)" : "none",
                          }}
                        >
                          📄 Save PDF &amp; Email to SolarX
                        </button>
                        {allFieldsComplete && (
                          <div style={{ fontSize: 11, color: "#94a3b8", textAlign: "center", marginTop: 8 }}>
                            Opens signed document with Save, Print, and Email options
                          </div>
                        )}
                      </div>
                  </div>
                )}
              </div>
            </div>
          </>
        )}

        {(!result || result.tooLow) && tab !== "calc" && (
          <div style={{ ...cardStyle, textAlign: "center", padding: 40 }}>
            <div style={{ fontSize: 32, marginBottom: 8 }}>⚡</div>
            <div style={{ fontSize: 14, color: "#64748b" }}>Enter your system details in the Calculator tab first.</div>
          </div>
        )}
      </div>

      {/* Bottom Nav */}
      <div style={{
        position: "fixed", bottom: 0, left: "50%", transform: "translateX(-50%)", width: "100%", maxWidth: 480,
        background: "rgba(255,255,255,0.95)", backdropFilter: "blur(10px)", borderTop: "1px solid #e2e8f0",
        display: "flex", justifyContent: "space-around", padding: "8px 0 env(safe-area-inset-bottom, 8px)", zIndex: 100,
      }}>
        {tabs.map(t => (
          <button key={t.id} onClick={() => setTab(t.id)} style={{
            background: "none", border: "none", display: "flex", flexDirection: "column", alignItems: "center", gap: 2,
            padding: "4px 16px", cursor: "pointer", color: tab === t.id ? "#f59e0b" : "#94a3b8", transition: "color 0.2s",
          }}>
            <span style={{ fontSize: 20 }}>{t.icon}</span>
            <span style={{ fontSize: 10, fontWeight: tab === t.id ? 700 : 500 }}>{t.label}</span>
          </button>
        ))}
      </div>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<SolarXApp />);
</script>
</body>
</html>
